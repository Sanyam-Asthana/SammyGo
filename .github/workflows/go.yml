name: Go Release

on:
  push:
    tags:
      - 'v*'   # triggers on v1.0.0, v2.1.3, etc.

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Build all platforms
      run: |
        GOOS=linux   GOARCH=amd64 go build -o sammygo-linux-amd64   ./cmd/sammygo
        GOOS=windows GOARCH=amd64 go build -o sammygo-windows-amd64.exe ./cmd/sammygo
        GOOS=darwin  GOARCH=amd64 go build -o sammygo-mac-amd64  ./cmd/sammygo
        GOOS=darwin  GOARCH=arm64 go build -o sammygo-mac-arm64  ./cmd/sammygo

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          sammygo-linux-amd64
          sammygo-windows-amd64.exe
          sammygo-mac-amd64
          sammygo-mac-arm64
